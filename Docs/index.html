<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>%UNITY_WEB_NAME%</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #unity-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        #loading-bar {
            position: fixed;
            left: 50%;
            bottom: 24px;
            width: min(280px, 70vw);
            height: 6px;
            overflow: hidden;
            border-radius: 4px;
            transform: translateX(-50%);
            background: #222;
        }

        #loading-fill {
            width: 0;
            height: 100%;
            background: #fff;
            transition: width .15s ease-out;
        }

        #fullscreen-button {
            position: fixed;
            right: 14px;
            bottom: 14px;
            padding: 8px 12px;
            border: 1px solid #777;
            border-radius: 5px;
            color: #fff;
            background: #222;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <button id="fullscreen-button" type="button">Fullscreen</button>

    <script src="%UNITY_WEBGL_LOADER_URL%"></script>
    <script>
        const canvas = document.querySelector('#unity-canvas');
        const loadingBar = document.querySelector('#loading-bar');
        const loadingFill = document.querySelector('#loading-fill');
        const fullscreenButton = document.querySelector('#fullscreen-button');
        const config = {
            dataUrl: '%UNITY_WEBGL_DATA_URL%',
            frameworkUrl: '%UNITY_WEBGL_FRAMEWORK_URL%',
            codeUrl: '%UNITY_WEBGL_CODE_URL%',
            streamingAssetsUrl: 'StreamingAssets',
            companyName: '%COMPANY_NAME%',
            productName: '%PRODUCT_NAME%',
            productVersion: '%PRODUCT_VERSION%',
            matchWebGLToCanvasSize: true,
            devicePixelRatio: 1
        };

        createUnityInstance(canvas, config, progress => {
            loadingFill.style.width = `${Math.round(progress * 100)}%`;
        }).then(unityInstance => {
            loadingBar.style.display = 'none';
            fullscreenButton.addEventListener('click', () => unityInstance.SetFullscreen(1));
        }).catch(message => {
            loadingBar.textContent = message;
            loadingBar.style.color = '#fff';
        });
    </script>
</body>
</html>
